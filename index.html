<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Regresiva: El Gran Día</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .title-font {
            font-family: 'Pacifico', cursive;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-pink-800 to-red-900 min-h-screen text-white overflow-hidden relative">

    <!-- Elementos de fondo animados -->
    <div id="balloons-container" class="absolute inset-0 pointer-events-none overflow-hidden z-0"></div>

    <!-- Contenido Principal -->
    <div class="relative z-10 flex flex-col items-center justify-center min-h-screen p-4 text-center">
        
        <h1 class="text-4xl md:text-6xl font-bold mb-8 title-font text-yellow-300 drop-shadow-lg animate-bounce">
            ¡La Gran Espera!
        </h1>

        <!-- Contador -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 w-full max-w-4xl">
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-6 border border-white/20 transform hover:scale-105 transition-transform duration-300">
                <span id="days" class="block text-5xl md:text-7xl font-bold text-pink-300">00</span>
                <span class="text-sm md:text-xl uppercase tracking-widest">Días</span>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-6 border border-white/20 transform hover:scale-105 transition-transform duration-300">
                <span id="hours" class="block text-5xl md:text-7xl font-bold text-purple-300">00</span>
                <span class="text-sm md:text-xl uppercase tracking-widest">Horas</span>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-6 border border-white/20 transform hover:scale-105 transition-transform duration-300">
                <span id="minutes" class="block text-5xl md:text-7xl font-bold text-blue-300">00</span>
                <span class="text-sm md:text-xl uppercase tracking-widest">Minutos</span>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-6 border border-white/20 transform hover:scale-105 transition-transform duration-300">
                <span id="seconds" class="block text-5xl md:text-7xl font-bold text-yellow-300">00</span>
                <span class="text-sm md:text-xl uppercase tracking-widest">Segundos</span>
            </div>
        </div>

        <!-- Leyenda -->
        <div class="bg-black/30 backdrop-blur-sm p-8 rounded-2xl max-w-3xl border border-white/10 shadow-2xl transform hover:scale-[1.02] transition-transform duration-500">
            <p class="text-xl md:text-3xl leading-relaxed font-light">
                "Dicen que lo bueno se hace esperar... pero lo que viene después de este contador va a necesitar su propio club de fans. <br>
                <span class="block mt-4 font-bold text-yellow-400">¿Estás listo para lo que se viene? 🚀🔥"</span>
            </p>
        </div>

        <!-- Botón interactivo extra -->
        <button id="celebrate-btn" class="mt-12 px-8 py-4 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-full text-black font-bold text-xl shadow-lg hover:shadow-xl transform hover:scale-110 active:scale-95 transition-all duration-300 animate-pulse">
            ¡Celebrar Ahora! 🍾
        </button>

    </div>

    <!-- Botellas flotantes (decoración) -->
    <div class="absolute bottom-10 left-10 text-6xl animate-bounce" style="animation-duration: 3s;">🍾</div>
    <div class="absolute top-20 right-20 text-6xl animate-bounce" style="animation-duration: 4s;">🥂</div>
    <div class="absolute bottom-1/4 right-10 text-6xl animate-pulse" style="animation-duration: 2s;">🎉</div>
    <div class="absolute top-1/3 left-20 text-6xl animate-pulse" style="animation-duration: 2.5s;">🎈</div>

    <script src="script.js"></script>
</body>
</html>
